name: CD Build OpenSSL QUIC Buildenv

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CD Check OpenSSL Release"]
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: openssl
            dockerfile: ./openssl/openssl.Dockerfile
            arch: amd64
            platform: linux/amd64

          - variant: openssl
            dockerfile: ./openssl/openssl.Dockerfile
            arch: 386
            platform: linux/386

          - variant: openssl
            dockerfile: ./openssl/openssl.Dockerfile
            arch: armv6
            platform: linux/arm/v6

          - variant: openssl
            dockerfile: ./openssl/openssl.Dockerfile
            arch: armv7
            platform: linux/arm/v7

          - variant: openssl
            dockerfile: ./openssl/openssl.Dockerfile
            arch: arm64
            platform: linux/arm64

          - variant: openssl
            dockerfile: ./openssl/openssl.Dockerfile
            arch: ppc64le
            platform: linux/ppc64le

          - variant: openssl
            dockerfile: ./openssl/openssl.Dockerfile
            arch: s390x
            platform: linux/s390x

          - variant: openssl
            dockerfile: ./openssl/openssl.Dockerfile
            arch: riscv64
            platform: linux/riscv64

          - variant: openssl+quic
            dockerfile: ./openssl/openssl+quic.Dockerfile
            arch: amd64
            platform: linux/amd64

          - variant: openssl+quic
            dockerfile: ./openssl/openssl+quic.Dockerfile
            arch: 386
            platform: linux/386

          - variant: openssl+quic
            dockerfile: ./openssl/openssl+quic.Dockerfile
            arch: armv6
            platform: linux/arm/v6

          - variant: openssl+quic
            dockerfile: ./openssl/openssl+quic.Dockerfile
            arch: armv7
            platform: linux/arm/v7

          - variant: openssl+quic
            dockerfile: ./openssl/openssl+quic.Dockerfile
            arch: arm64
            platform: linux/arm64

          - variant: openssl+quic
            dockerfile: ./openssl/openssl+quic.Dockerfile
            arch: ppc64le
            platform: linux/ppc64le

          - variant: openssl+quic
            dockerfile: ./openssl/openssl+quic.Dockerfile
            arch: s390x
            platform: linux/s390x

          - variant: openssl+quic
            dockerfile: ./openssl/openssl+quic.Dockerfile
            arch: riscv64
            platform: linux/riscv64

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Load buildvars
        id: vars
        run: |
          set -euo pipefail
          source buildvars || true
          if [ -n "${SUBVERSION:-}" ]; then
            DERIVED_SUB="${SUBVERSION}"
          elif printf '%s' "${OPENSSL_BUILDENV_VERSION:-}" | grep -Eq '-[0-9]+$'; then
            DERIVED_SUB="$(printf '%s' "${OPENSSL_BUILDENV_VERSION}" | sed -E 's/.*-([0-9]+)$/\1/')"
          else
            DERIVED_SUB="0"
          fi
          if printf '%s' "${OPENSSL_BUILDENV_VERSION:-}" | grep -Eq '-[0-9]+$'; then
            OPENSSL_BASE="$(printf '%s' "${OPENSSL_BUILDENV_VERSION}" | sed -E 's/-[0-9]+$//')"
          else
            OPENSSL_BASE="${OPENSSL_BUILDENV_VERSION:-}"
          fi
          if [ -n "${QUIC_BUILDENV_VERSION:-}" ]; then
            if printf '%s' "${QUIC_BUILDENV_VERSION}" | grep -Eq '-[0-9]+$'; then
              QUIC_BASE="$(printf '%s' "${QUIC_BUILDENV_VERSION}" | sed -E 's/-[0-9]+$//')"
            else
              QUIC_BASE="${QUIC_BUILDENV_VERSION}"
            fi
          else
            QUIC_BASE="${OPENSSL_BASE}"
          fi
          echo "SUBVERSION=${DERIVED_SUB}" >> $GITHUB_OUTPUT
          echo "OPENSSL_FINAL=${OPENSSL_BASE}-${DERIVED_SUB}" >> $GITHUB_OUTPUT
          echo "QUIC_FINAL=${QUIC_BASE}-${DERIVED_SUB}-quic" >> $GITHUB_OUTPUT
          echo "OPENSSL_VERSION=${OPENSSL_VERSION:-}" >> $GITHUB_OUTPUT
          echo "OPENSSL_SHA256=${OPENSSL_SHA256:-}" >> $GITHUB_OUTPUT
          echo "NGTCP2_VERSION=${NGTCP2_VERSION:-}" >> $GITHUB_OUTPUT
          echo "NGHTTP3_VERSION=${NGHTTP3_VERSION:-}" >> $GITHUB_OUTPUT
          echo "BUILDENV_BUILD_DATE=${BUILDENV_BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}" >> $GITHUB_OUTPUT


      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build OpenSSL
        if: ${{ matrix.variant == 'openssl' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=registry,ref=madnuttah/openssl-buildenv:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=madnuttah/openssl-buildenv:buildcache-${{ matrix.arch }},mode=max
          build-args: |
            BUILDENV_BUILD_DATE=${{ steps.vars.outputs.BUILDENV_BUILD_DATE }}
            OPENSSL_VERSION=${{ steps.vars.outputs.OPENSSL_VERSION }}
            OPENSSL_SHA256=${{ steps.vars.outputs.OPENSSL_SHA256 }}
            TARGETARCH=${{ matrix.arch }}
          tags: |
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-${{ matrix.arch }}

      - name: Build QUIC
        if: ${{ matrix.variant == 'openssl+quic' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=registry,ref=madnuttah/openssl-buildenv:buildcache-${{ matrix.arch }}-quic
          cache-to: type=registry,ref=madnuttah/openssl-buildenv:buildcache-${{ matrix.arch }}-quic,mode=max
          build-args: |
            BUILDENV_BUILD_DATE=${{ steps.vars.outputs.BUILDENV_BUILD_DATE }}
            OPENSSL_VERSION=${{ steps.vars.outputs.OPENSSL_VERSION }}
            OPENSSL_SHA256=${{ steps.vars.outputs.OPENSSL_SHA256 }}
            NGTCP2_VERSION=${{ steps.vars.outputs.NGTCP2_VERSION }}
            NGHTTP3_VERSION=${{ steps.vars.outputs.NGHTTP3_VERSION }}
            TARGETARCH=${{ matrix.arch }}
          tags: |
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-${{ matrix.arch }}

  manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Load buildvars
        id: vars
        run: |
          set -euo pipefail
          source buildvars

          OPENSSL_FINAL="${OPENSSL_BUILDENV_VERSION}"
          QUIC_FINAL="${OPENSSL_QUIC_BUILDENV_VERSION}"

          echo "OPENSSL_FINAL=${OPENSSL_FINAL}" >> $GITHUB_OUTPUT
          echo "QUIC_FINAL=${QUIC_FINAL}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Manifest OpenSSL
        run: |
          docker buildx imagetools create \
            --tag madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }} \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-amd64 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-386 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-armv6 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-armv7 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-arm64 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-ppc64le \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-s390x \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-riscv64

      - name: Manifest QUIC
        run: |
          docker buildx imagetools create \
            --tag madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }} \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-amd64 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-386 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-armv6 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-armv7 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-arm64 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-ppc64le \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-s390x \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-riscv64

      - name: Latest tags
        run: |
          docker buildx imagetools create \
            --tag madnuttah/openssl-buildenv:latest \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-amd64 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-386 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-armv6 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-armv7 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-arm64 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-ppc64le \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-s390x \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.OPENSSL_FINAL }}-riscv64

          docker buildx imagetools create \
            --tag madnuttah/openssl-buildenv:latest-quic \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-amd64 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-386 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-armv6 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-armv7 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-arm64 \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-ppc64le \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-s390x \
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.QUIC_FINAL }}-riscv64
