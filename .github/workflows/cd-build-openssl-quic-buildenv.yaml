name: CD Build OpenSSL QUIC Buildenv

on:
  push:
    branches:
      - main
    paths:
      - versions/openssl.txt
      - versions/ngtcp2.txt
      - versions/nghttp3.txt
      - versions/openssl-quic-buildenv.txt
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: 386
            platform: linux/386
          - arch: armv6
            platform: linux/arm/v6
          - arch: armv7
            platform: linux/arm/v7
          - arch: arm64
            platform: linux/arm64
          - arch: ppc64le
            platform: linux/ppc64le
          - arch: s390x
            platform: linux/s390x
          - arch: riscv64
            platform: linux/riscv64

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Load versions
        id: vars
        run: |
          set -euo pipefail
          OPENSSL_VERSION=$(cat versions/openssl.txt)
          NGTCP2_VERSION=$(cat versions/ngtcp2.txt)
          NGHTTP3_VERSION=$(cat versions/nghttp3.txt)
          BUILDENV_QUIC_VERSION=$(cat versions/openssl-quic-buildenv.txt)
          BUILDENV_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "OPENSSL_VERSION=${OPENSSL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "NGTCP2_VERSION=${NGTCP2_VERSION}" >> "$GITHUB_OUTPUT"
          echo "NGHTTP3_VERSION=${NGHTTP3_VERSION}" >> "$GITHUB_OUTPUT"
          echo "BUILDENV_QUIC_VERSION=${BUILDENV_QUIC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "BUILDENV_BUILD_DATE=${BUILDENV_BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build OpenSSL QUIC
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./openssl/openssl-quic.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=registry,ref=madnuttah/openssl-buildenv:buildcache-${{ matrix.arch }}-quic
          cache-to: type=registry,ref=madnuttah/openssl-buildenv:buildcache-${{ matrix.arch }}-quic,mode=max
          build-args: |
            BUILDENV_BUILD_DATE=${{ steps.vars.outputs.BUILDENV_BUILD_DATE }}
            OPENSSL_VERSION=${{ steps.vars.outputs.OPENSSL_VERSION }}
            NGTCP2_VERSION=${{ steps.vars.outputs.NGTCP2_VERSION }}
            NGHTTP3_VERSION=${{ steps.vars.outputs.NGHTTP3_VERSION }}
            TARGETARCH=${{ matrix.arch }}
          tags: |
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.BUILDENV_QUIC_VERSION }}-quic-${{ matrix.arch }}

      # - name: Install Syft and Cosign
        # run: |
          # curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          # COSIGN_VERSION="v2.4.0"
          # curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o /usr/local/bin/cosign
          # chmod +x /usr/local/bin/cosign

      # - name: Generate SBOM for QUIC image
        # env:
          # IMAGE: madnuttah/openssl-buildenv:${{ steps.vars.outputs.BUILDENV_QUIC_VERSION }}-quic-${{ matrix.arch }}
        # run: |
          # syft packages "docker:${IMAGE}" -o cyclonedx-json > "sbom-quic-${{ matrix.arch }}.json"

      # - name: Upload QUIC SBOM artifact
        # uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        # with:
          # name: sbom-openssl-quic-buildenv-${{ matrix.arch }}
          # path: sbom-quic-${{ matrix.arch }}.json

      # - name: Generate QUIC SLSA provenance attestation
        # env:
          # COSIGN_EXPERIMENTAL: "1"
          # IMAGE: madnuttah/openssl-buildenv:${{ steps.vars.outputs.BUILDENV_QUIC_VERSION }}-quic-${{ matrix.arch }}
        # run: |
          # cosign attest \
            # --predicate-type slsaprovenance.dev/v1 \
            # --predicate <(echo '{"buildType":"openssl-quic-buildenv","arch":"${{ matrix.arch }}"}') \
            # "${IMAGE}"


  version-artifact:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Write QUIC version artifact
        run: |
          set -euo pipefail
          BUILDENV_QUIC_VERSION=$(cat versions/openssl-quic-buildenv.txt)
          echo "${BUILDENV_QUIC_VERSION}" > version.txt

      - name: Upload QUIC version artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: openssl-quic-buildenv-version
          path: version.txt
