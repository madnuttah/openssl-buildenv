name: CD Build Multiarch OpenSSL+Quic BuildEnv Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

env:
  DOCKERHUB_SLUG: "madnuttah/openssl-buildenv"

jobs:
  detect_versions:
    runs-on: ubuntu-latest
    outputs:
      OPENSSL_VERSION: ${{ steps.detect.outputs.OPENSSL_VERSION }}
      BUILDENV_BUILD_DATE: ${{ steps.detect.outputs.BUILDENV_BUILD_DATE }}

    steps:
      - name: Detect latest OpenSSL QUIC version
        id: detect
        run: |
          OPENSSL_VERSION=$(curl -s https://api.github.com/repos/quictls/openssl/releases/latest | jq -r .tag_name)
          echo "OPENSSL_VERSION=$OPENSSL_VERSION" >> $GITHUB_OUTPUT
          echo "BUILDENV_BUILD_DATE=$(date -u)" >> $GITHUB_OUTPUT

  linux_386:
    runs-on: ubuntu-latest
    needs: detect_versions
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          platforms: linux/386
          builder: ${{ steps.buildx.outputs.name }}
          build-args: |
            BUILDENV_BUILD_DATE=${{ needs.detect_versions.outputs.BUILDENV_BUILD_DATE }}
            OPENSSL_BUILDENV_VERSION=${{ needs.detect_versions.outputs.OPENSSL_VERSION }}
          file: ./openssl+quic/linux_386_quic.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          provenance: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.detect_versions.outputs.OPENSSL_VERSION }}-386

  linux_arm_v6:
    runs-on: ubuntu-22.04
    needs: detect_versions
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          platforms: linux/arm/v6
          builder: ${{ steps.buildx.outputs.name }}
          build-args: |
            BUILDENV_BUILD_DATE=${{ needs.detect_versions.outputs.BUILDENV_BUILD_DATE }}
            OPENSSL_BUILDENV_VERSION=${{ needs.detect_versions.outputs.OPENSSL_VERSION }}
          file: ./openssl+quic/linux_32_quic.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          provenance: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.detect_versions.outputs.OPENSSL_VERSION }}-armv6

  linux_arm_v7:
    runs-on: ubuntu-22.04
    needs: detect_versions
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          platforms: linux/arm/v7
          builder: ${{ steps.buildx.outputs.name }}
          build-args: |
            BUILDENV_BUILD_DATE=${{ needs.detect_versions.outputs.BUILDENV_BUILD_DATE }}
            OPENSSL_BUILDENV_VERSION=${{ needs.detect_versions.outputs.OPENSSL_VERSION }}
          file: ./openssl+quic/linux_32_quic.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          provenance: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.detect_versions.outputs.OPENSSL_VERSION }}-armv7

  linux_arm64:
    runs-on: ubuntu-22.04
    needs: detect_versions
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          platforms: linux/arm64
          builder: ${{ steps.buildx.outputs.name }}
          build-args: |
            BUILDENV_BUILD_DATE=${{ needs.detect_versions.outputs.BUILDENV_BUILD_DATE }}
            OPENSSL_BUILDENV_VERSION=${{ needs.detect_versions.outputs.OPENSSL_VERSION }}
          file: ./openssl+quic/linux_64_quic.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          provenance: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.detect_versions.outputs.OPENSSL_VERSION }}-arm64

  linux_amd64:
    runs-on: ubuntu-latest
    needs: detect_versions
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          builder: ${{ steps.buildx.outputs.name }}
          build-args: |
            BUILDENV_BUILD_DATE=${{ needs.detect_versions.outputs.BUILDENV_BUILD_DATE }}
            OPENSSL_BUILDENV_VERSION=${{ needs.detect_versions.outputs.OPENSSL_VERSION }}
          file: ./openssl+quic/linux_64_quic.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          provenance: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.detect_versions.outputs.OPENSSL_VERSION }}-amd64

  create-manifest-list:
    runs-on: ubuntu-latest
    needs:
      - detect_versions
      - linux_386
      - linux_arm_v6
      - linux_arm_v7
      - linux_arm64
      - linux_amd64

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifests
        if: github.event_name != 'pull_request'
        run: |
          VERSION=${{ needs.detect_versions.outputs.OPENSSL_VERSION }}
          docker manifest create ${{ env.DOCKERHUB_SLUG }}:$VERSION \
            --amend ${{ env.DOCKERHUB_SLUG }}:$VERSION-386 \
            --amend ${{ env.DOCKERHUB_SLUG }}:$VERSION-arm64 \
            --amend ${{ env.DOCKERHUB_SLUG }}:$VERSION-amd64 \
            --amend ${{ env.DOCKERHUB_SLUG }}:$VERSION-armv6 \
            --amend ${{ env.DOCKERHUB_SLUG }}:$VERSION-armv7
          docker manifest push ${{ env.DOCKERHUB_SLUG }}:$VERSION
