name: Renovate

env:
  LOG_LEVEL: debug
  LOG_FILE: renovate.log
  LOG_FILE_LEVEL: debug
  RENOVATE_VERSION: 46.1.14

  RENOVATE_DEPENDENCY_DASHBOARD_HEADER: |
    Automated dependency updates for this repository.
  RENOVATE_DEPENDENCY_DASHBOARD_FOOTER: |
    This issue was automatically generated by Renovate Bot.
  RENOVATE_PR_FOOTER: |
    This PR was automatically generated by Renovate Bot.
  RENOVATE_PR_BODY_NOTES: |
    This update was applied automatically. No manual review required.

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:

  renovate:
    name: Renovate – Full Automation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Renovate
        uses: actions/cache@v4
        with:
          path: ~/.cache/renovate
          key: renovate-cache-${{ github.ref }}

      - name: Run Renovate
        uses: renovatebot/github-action@v40
        with:
          renovate-version: ${{ env.RENOVATE_VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          log-level: ${{ env.LOG_LEVEL }}

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renovate-logs
          path: ${{ env.LOG_FILE }}

  renovate-dry-run:
    name: Renovate – Dry Run
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Renovate
        uses: actions/cache@v4
        with:
          path: ~/.cache/renovate
          key: renovate-cache-${{ github.ref }}

      - name: Run Renovate (Dry Run)
        uses: renovatebot/github-action@v40
        with:
          renovate-version: ${{ env.RENOVATE_VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          log-level: ${{ env.LOG_LEVEL }}
          extra-args: --dry-run

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renovate-dry-run-logs
          path: ${{ env.LOG_FILE }}
