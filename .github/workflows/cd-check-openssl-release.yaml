name: CD Check OpenSSL Release

on:
  schedule:
    - cron: '0 12-17 * * mon-fri'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  openssl-update:
    runs-on: ubuntu-latest

    outputs:
      update_available: ${{ steps.IS_UPDATE_AVAILABLE.outputs.update_available }}
      OPENSSL_VERSION: ${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}
      OPENSSL_SHA256: ${{ steps.IS_UPDATE_AVAILABLE.outputs.OPENSSL_SHA256 }}
      OPENSSL_BUILDENV_VERSION: ${{ steps.GET_VERSIONS.outputs.OPENSSL_BUILDENV_VERSION }}
      NGTCP2_VERSION: ${{ steps.GET_VERSIONS.outputs.NGTCP2_VERSION }}
      NGHTTP3_VERSION: ${{ steps.GET_VERSIONS.outputs.NGHTTP3_VERSION }}

    steps:
      - name: Get versions
        id: GET_VERSIONS
        run: |
          BOOL="$(curl -s https://api.github.com/repos/openssl/openssl/releases | jq '.[0] | .prerelease')"
          if $BOOL; then
            echo "update_available=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo OPENSSL_VERSION="$(curl -s https://api.github.com/repos/openssl/openssl/releases \
            | jq -r '.[0].tag_name' \
            | sed -E 's/.*?([0-9]+\.[0-9]+\.[0-9]+).*/\1/')" >> $GITHUB_OUTPUT

          echo OPENSSL_BUILDENV_VERSION="$(curl -s https://api.github.com/repos/madnuttah/openssl-buildenv/releases \
            | jq -r '.[0].tag_name' \
            | sed -E 's/.*?([0-9]+\.[0-9]+\.[0-9]+).*/\1/')" >> $GITHUB_OUTPUT

          echo NGTCP2_VERSION="$(curl -s https://api.github.com/repos/ngtcp2/ngtcp2/releases \
            | jq -r '.[0].tag_name')" >> $GITHUB_OUTPUT

          echo NGHTTP3_VERSION="$(curl -s https://api.github.com/repos/ngtcp2/nghttp3/releases \
            | jq -r '.[0].tag_name')" >> $GITHUB_OUTPUT

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Is update available
        id: IS_UPDATE_AVAILABLE
        run: |
          source buildvars
          LATEST_MAJOR="$(echo "${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}" | cut -d. -f1)"

          if ! echo "$ALLOWED_MAJOR_OVERRIDES" | tr ',' '\n' | grep -qx "$LATEST_MAJOR"; then
            echo "update_available=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          if dpkg --compare-versions "${{ steps.GET_VERSIONS.outputs.OPENSSL_BUILDENV_VERSION }}" "lt" "${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}"; then
            echo OPENSSL_SHA256="$(curl -sL https://github.com/openssl/openssl/releases/download/openssl-${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}/openssl-${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}.tar.gz.sha256?raw=1 | cut -d ' ' -f1)" >> $GITHUB_OUTPUT
            echo "update_available=true" >> $GITHUB_OUTPUT
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Import GPG key
        if: ${{ steps.IS_UPDATE_AVAILABLE.outputs.update_available == 'true' }}
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: false
          git_commit_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5

      - name: Push buildvars to repository
        if: ${{ steps.IS_UPDATE_AVAILABLE.outputs.update_available == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.BOT_GITHUB_TOKEN }}@github.com/${{ github.repository }}

          BUILDENV_TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          OPENSSL_VERSION="${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}"
          SUBVERSION="0"
          ALLOWED_MAJOR_OVERRIDES="${ALLOWED_MAJOR_OVERRIDES}"
          OPENSSL_SHA256="${{ steps.IS_UPDATE_AVAILABLE.outputs.OPENSSL_SHA256 }}"
          OPENSSL_BUILDENV_VERSION="${OPENSSL_VERSION}-0"
          OPENSSL_QUIC_BUILDENV_VERSION="${OPENSSL_VERSION}-0-quic"
          NGTCP2_VERSION="${{ steps.GET_VERSIONS.outputs.NGTCP2_VERSION }}"
          NGHTTP3_VERSION="${{ steps.GET_VERSIONS.outputs.NGHTTP3_VERSION }}"

          {
            echo "BUILDENV_TIMESTAMP=${BUILDENV_TIMESTAMP}"
            echo "OPENSSL_VERSION=${OPENSSL_VERSION}"
            echo "SUBVERSION=${SUBVERSION}"
            echo "ALLOWED_MAJOR_OVERRIDES=${ALLOWED_MAJOR_OVERRIDES}"
            echo "OPENSSL_SHA256=${OPENSSL_SHA256}"
            echo "OPENSSL_BUILDENV_VERSION=${OPENSSL_BUILDENV_VERSION}"
            echo "OPENSSL_QUIC_BUILDENV_VERSION=${OPENSSL_QUIC_BUILDENV_VERSION}"
            echo "NGTCP2_VERSION=${NGTCP2_VERSION}"
            echo "NGHTTP3_VERSION=${NGHTTP3_VERSION}"
          } > buildvars

          git add buildvars
          git commit -m "Updated buildvars" || echo "No changes to commit"
          git push origin main

          exit 0
