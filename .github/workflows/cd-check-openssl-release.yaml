name: CD Check OpenSSL Release
             
on:
  schedule:
    - cron: '0 15 * * mon-fri'
  workflow_dispatch:
       
jobs:
  openssl-update:
    runs-on: ubuntu-latest
              
    steps:
      - name: Get versions
        id: GET_VERSIONS
        run: |
          BOOL="$(curl -s https://api.github.com/repos/openssl/openssl/releases | jq '.[0] | .prerelease')"
          if $BOOL; then
            echo "Pre-release, skipping"
            exit 1
          fi

          echo OPENSSL_VERSION="$(curl -s https://api.github.com/repos/openssl/openssl/releases \
            | jq -r '.[0].name' \
            | grep -Eo '([0-9]+)(\.?[0-9]+)*' \
            | head -1)" >> $GITHUB_OUTPUT

          echo OPENSSL_BUILDENV_VERSION="$(curl -s https://api.github.com/repos/madnuttah/openssl-buildenv/releases \
            | jq -r '.[0].name' \
            | grep -Eo '([0-9]+)(\.?[0-9]+)*' \
            | head -1)" >> $GITHUB_OUTPUT

          echo NGTCP2_VERSION="$(curl -s https://api.github.com/repos/ngtcp2/ngtcp2/releases \
            | jq -r '.[0].tag_name')" >> $GITHUB_OUTPUT

          echo NGHTTP3_VERSION="$(curl -s https://api.github.com/repos/ngtcp2/nghttp3/releases \
            | jq -r '.[0].tag_name')" >> $GITHUB_OUTPUT

          echo SFPARSE_VERSION="$(curl -s https://api.github.com/repos/ngtcp2/sfparse/releases \
            | jq -r '.[0].tag_name')" >> $GITHUB_OUTPUT

      - name: Is update available
        id: IS_UPDATE_AVAILABLE
        env:
          ALLOWED_MAJOR_OVERRIDES: "4"
        run: |
          CURRENT_MAJOR="$(echo "${{ steps.GET_VERSIONS.outputs.OPENSSL_BUILDENV_VERSION }}" | cut -d. -f1)"
          LATEST_MAJOR="$(echo "${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}" | cut -d. -f1)"

          if [ "$CURRENT_MAJOR" != "$LATEST_MAJOR" ]; then
            if echo "$ALLOWED_MAJOR_OVERRIDES" | tr ',' '\n' | grep -qx "$LATEST_MAJOR"; then
              :
            else
              exit 1
            fi
          fi

          if dpkg --compare-versions "${{ steps.GET_VERSIONS.outputs.OPENSSL_BUILDENV_VERSION }}" "lt" "${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}"; then  
            echo OPENSSL_SHA256="$(curl -sL https://github.com/openssl/openssl/releases/download/openssl-${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}/openssl-${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}.tar.gz.sha256?raw=1 | cut -d ' ' -f1)" >> $GITHUB_OUTPUT
          else
            exit 1
          fi
          
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          
      - name: Import GPG key 
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: false
          git_commit_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5
          
      - name: Push buildvars to repository
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.BOT_GITHUB_TOKEN }}@github.com/${{ github.repository }}

          echo BUILDENV_BUILD_DATE="$(date -u)" > buildvars
          echo OPENSSL_VERSION="${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}" >> buildvars
          echo OPENSSL_SHA256="${{ steps.IS_UPDATE_AVAILABLE.outputs.OPENSSL_SHA256 }}" >> buildvars
          echo OPENSSL_BUILDENV_VERSION="${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}-0" >> buildvars

          echo NGTCP2_VERSION="${{ steps.GET_VERSIONS.outputs.NGTCP2_VERSION }}" >> buildvars
          echo NGHTTP3_VERSION="${{ steps.GET_VERSIONS.outputs.NGHTTP3_VERSION }}" >> buildvars
          echo SFPARSE_VERSION="${{ steps.GET_VERSIONS.outputs.SFPARSE_VERSION }}" >> buildvars
          echo QUIC_BUILDENV_VERSION="${{ steps.GET_VERSIONS.outputs.OPENSSL_VERSION }}-quic-0" >> buildvars

          git add buildvars
          git commit buildvars -m "Updated buildvars"
          git push origin main
          exit 0
