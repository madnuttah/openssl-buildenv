name: CD Auto-Increment Subversions

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  bump-sub:
    if: github.actor == 'renovate[bot]' && (contains(github.event.pull_request.labels.*.name, 'bump-quic-subversion') || contains(github.event.pull_request.labels.*.name, 'bump-openssl-subversion'))

    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      # Import GPG key so we can use madnuttah-bot identity
      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Process Subversion Logic
        run: |
          import re
          import os

          labels = "${{ join(github.event.pull_request.labels.*.name, ',') }}".split(',')
          
          def modify_subversion(filepath, reset=False):
              if not os.path.exists(filepath):
                  print(f"File not found: {filepath}")
                  return False
              
              with open(filepath, 'r') as f:
                  content = f.read()
              
              match = re.search(r'sub=(\d+)', content)
              if match:
                  old_sub = int(match.group(1))
                  new_sub = 0 if reset else old_sub + 1
                  
                  if old_sub == new_sub:
                      print(f"{filepath} already is on sub={new_sub}. No change necessary.")
                      return False
                      
                  new_content = content.replace(f"sub={old_sub}", f"sub={new_sub}")
                  with open(filepath, 'w') as f:
                      f.write(new_content)
                  print(f"Updated {filepath}: sub={old_sub} -> sub={new_sub}")
                  return True
              return False

          changed = False
          
          if 'bump-openssl-subversion' in labels:
              is_openssl_update = False
              try:
                  import subprocess
                  changed_files = subprocess.check_output(["git", "diff", "--name-only", "origin/main"]).decode("utf-8")
                  if "versions/openssl.txt" in changed_files:
                      is_openssl_update = True
              except Exception:
                  pass

              if modify_subversion('versions/openssl-buildenv.txt', reset=is_openssl_update):
                  changed = True
              if modify_subversion('versions/openssl-quic-buildenv.txt', reset=is_openssl_update):
                  changed = True

          elif 'bump-quic-subversion' in labels:
              if modify_subversion('versions/openssl-quic-buildenv.txt', reset=False):
                  changed = True

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"HAS_CHANGES={str(changed).lower()}\n")
        shell: python

      - name: Commit and Push Changes
        if: env.HAS_CHANGES == 'true'
        run: |
          git config --local user.name "${{ steps.IMPORT_GPG.outputs.name }}"
          git config --local user.email "${{ steps.IMPORT_GPG.outputs.email }}"
          git add versions/*.txt
          git commit -m "fix: auto-manage buildenv subversion [skip ci]"
          git push
