name: CD Increment Subversions

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  bump-sub:
    if: github.actor == 'renovate[bot]' && (contains(github.event.pull_request.labels.*.name, 'bump-quic-subversion') || contains(github.event.pull_request.labels.*.name, 'bump-openssl-subversion'))

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Process Subversion Logic
        shell: python
        run: |
          import re
          import os
          import subprocess

          labels = "${{ join(github.event.pull_request.labels.*.name, ',') }}".split(',')

          def modify_subversion(filepath, reset=False):
              if not os.path.exists(filepath):
                  print(f"File not found: {filepath}")
                  return False

              with open(filepath, 'r') as f:
                  content = f.read()

              match = re.search(r'sub=(\d+)', content)
              if match:
                  old_sub = int(match.group(1))
                  new_sub = 0 if reset else old_sub + 1

                  if old_sub == new_sub:
                      print(f"{filepath} already is on sub={new_sub}. No change necessary.")
                      return False

                  new_content = content.replace(f"sub={old_sub}", f"sub={new_sub}")
                  with open(filepath, 'w') as f:
                      f.write(new_content)
                  print(f"Updated {filepath}: sub={old_sub} -> sub={new_sub}")
                  return True
              return False

          def get_changed_files():
              try:
                  output = subprocess.check_output(["git", "diff", "--name-only", "origin/main"]).decode("utf-8")
                  return output.strip().split('\n') if output.strip() else []
              except Exception as e:
                  print(f"Warning: Could not get changed files: {e}")
                  return []

          changed = False
          changed_files = get_changed_files()

          openssl_changed = "versions/openssl.txt" in changed_files
          ngtcp2_changed = "versions/ngtcp2.txt" in changed_files
          nghttp3_changed = "versions/nghttp3.txt" in changed_files
          quic_deps_changed = ngtcp2_changed or nghttp3_changed

          print(f"Changed files: {changed_files}")
          print(f"OpenSSL changed: {openssl_changed}")
          print(f"QUIC deps changed (ngtcp2/nghttp3): {quic_deps_changed}")

          if 'bump-openssl-subversion' in labels:
              print("Processing 'bump-openssl-subversion' label...")

              if modify_subversion('versions/openssl-buildenv.txt', reset=True):
                  changed = True
              if modify_subversion('versions/openssl-quic-buildenv.txt', reset=True):
                  changed = True

          elif 'bump-quic-subversion' in labels:
              print("Processing 'bump-quic-subversion' label...")

              if quic_deps_changed:
                  if modify_subversion('versions/openssl-quic-buildenv.txt', reset=False):
                      changed = True
              else:
                  print("Warning: 'bump-quic-subversion' label present but no QUIC deps changed")

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"HAS_CHANGES={str(changed).lower()}\n")

      - name: Commit and Push Changes
        if: env.HAS_CHANGES == 'true'
        run: |
          git config --local user.name "${{ steps.IMPORT_GPG.outputs.name }}"
          git config --local user.email "${{ steps.IMPORT_GPG.outputs.email }}"
          git add versions/*.txt
          git commit -m "fix: auto-manage buildenv subversion"
          git push
