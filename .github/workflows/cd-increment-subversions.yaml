name: CD Increment OpenSSL Subversions

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-sub:
    if: github.actor == 'renovate[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Process Subversion Logic
        shell: python
        run: |
          import re
          import os
          import subprocess

          def modify_subversion(filepath, reset=False):
              """Modify subversion inside 'openssl=X.Y.Z-N[-quic]'."""
              if not os.path.exists(filepath):
                  print(f"File not found: {filepath}")
                  return False

              with open(filepath, 'r') as f:
                  content = f.read().strip()

              match = re.search(r'openssl=(\d+\.\d+\.\d+)-(\d+)(-quic)?', content)
              if not match:
                  print(f"No version pattern found in {filepath}")
                  return False

              base = match.group(1)
              old_sub = int(match.group(2))
              suffix = match.group(3) or ""

              new_sub = 0 if reset else old_sub + 1

              if new_sub == old_sub:
                  print(f"{filepath} already at sub={new_sub}. No change.")
                  return False

              new_version = f"openssl={base}-{new_sub}{suffix}"

              with open(filepath, 'w') as f:
                  f.write(new_version + "\n")

              print(f"Updated {filepath}: {base}-{old_sub}{suffix} → {base}-{new_sub}{suffix}")
              return True

          def get_changed_files():
              """Get files changed compared to main branch."""
              try:
                  result = subprocess.run(
                      ["git", "diff", "--name-only", "origin/main"],
                      capture_output=True,
                      text=True,
                      check=False
                  )
                  return result.stdout.strip().split('\n') if result.stdout.strip() else []
              except Exception as e:
                  print(f"Warning: Could not get changed files: {e}")
                  return []

          changed = False
          changed_files = get_changed_files()

          openssl_changed = "versions/openssl.txt" in changed_files
          ngtcp2_changed = "versions/ngtcp2.txt" in changed_files
          nghttp3_changed = "versions/nghttp3.txt" in changed_files
          quic_deps_changed = ngtcp2_changed or nghttp3_changed

          print(f"Changed files: {changed_files}")
          print(f"OpenSSL changed: {openssl_changed}")
          print(f"QUIC deps changed: {quic_deps_changed}")

          # 1) OpenSSL changed → reset both
          if openssl_changed:
              print("OpenSSL changed → resetting subversions")
              if modify_subversion('versions/openssl-buildenv.txt', reset=True):
                  changed = True
              if modify_subversion('versions/openssl-quic-buildenv.txt', reset=True):
                  changed = True

          # 2) QUIC deps changed → bump only QUIC
          if quic_deps_changed:
              print("QUIC deps changed → bumping QUIC subversion")
              if modify_subversion('versions/openssl-quic-buildenv.txt', reset=False):
                  changed = True

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"HAS_CHANGES={'true' if changed else 'false'}\n")

      - name: Commit and Push Changes
        if: env.HAS_CHANGES == 'true'
        run: |
          set -euo pipefail

          git config --local user.name "${{ steps.IMPORT_GPG.outputs.name }}"
          git config --local user.email "${{ steps.IMPORT_GPG.outputs.email }}"
          git add versions/*.txt
          git commit -m "fix: auto-manage openssl subversion"
          git push

      - name: Fail if no changes were made
        if: env.HAS_CHANGES == 'false'
        run: |
          echo "Expected to bump subversion but no changes were made."
          exit 1
