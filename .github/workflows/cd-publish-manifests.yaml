name: CD Publish OpenSSL Buildenv Manifests

on:
  workflow_run:
    workflows:
      - CD Build OpenSSL Buildenv
      - CD Build OpenSSL QUIC Buildenv
    types:
      - completed

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish-manifests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Download metadata artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: openssl-buildenv-metadata
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: metadata

      - name: Read versions
        id: versions
        run: |
          set -euo pipefail

          NONQUIC_VERSION=""
          QUIC_VERSION=""

          if [ ! -f metadata/variant.txt ]; then
            echo "No metadata artifacts found, nothing to do."
            exit 0
          fi

          VARIANT="$(cat metadata/variant.txt)"
          VERSION="$(cat metadata/version.txt)"

          if [ "$VARIANT" = "stable" ]; then
            NONQUIC_VERSION="$VERSION"
          elif [ "$VARIANT" = "stable-quic" ]; then
            QUIC_VERSION="$VERSION"
          fi

          echo "NONQUIC_VERSION=${NONQUIC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "QUIC_VERSION=${QUIC_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create non-QUIC manifest
        if: ${{ steps.versions.outputs.NONQUIC_VERSION != '' }}
        id: nonquic_manifest
        run: |
          set -euo pipefail
          VERSION="${{ steps.versions.outputs.NONQUIC_VERSION }}"
          METADATA_FILE="nonquic-metadata.json"

          docker buildx imagetools create --metadata-file "$METADATA_FILE" \
            -t madnuttah/openssl-buildenv:${VERSION} \
            -t madnuttah/openssl-buildenv:latest \
            madnuttah/openssl-buildenv:${VERSION}-amd64 \
            madnuttah/openssl-buildenv:${VERSION}-386 \
            madnuttah/openssl-buildenv:${VERSION}-armv6 \
            madnuttah/openssl-buildenv:${VERSION}-armv7 \
            madnuttah/openssl-buildenv:${VERSION}-arm64 \
            madnuttah/openssl-buildenv:${VERSION}-ppc64le \
            madnuttah/openssl-buildenv:${VERSION}-s390x \
            madnuttah/openssl-buildenv:${VERSION}-riscv64

          DIGEST=$(jq -r '.["containerimage.descriptor"].digest' "$METADATA_FILE")
          echo "DIGEST=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Create QUIC manifest
        if: ${{ steps.versions.outputs.QUIC_VERSION != '' }}
        id: quic_manifest
        run: |
          set -euo pipefail
          VERSION="${{ steps.versions.outputs.QUIC_VERSION }}"
          METADATA_FILE="quic-metadata.json"

          docker buildx imagetools create --metadata-file "$METADATA_FILE" \
            -t madnuttah/openssl-buildenv:${VERSION} \
            -t madnuttah/openssl-buildenv:latest-quic \
            madnuttah/openssl-buildenv:${VERSION}-amd64 \
            madnuttah/openssl-buildenv:${VERSION}-386 \
            madnuttah/openssl-buildenv:${VERSION}-armv6 \
            madnuttah/openssl-buildenv:${VERSION}-armv7 \
            madnuttah/openssl-buildenv:${VERSION}-arm64 \
            madnuttah/openssl-buildenv:${VERSION}-ppc64le \
            madnuttah/openssl-buildenv:${VERSION}-s390x \
            madnuttah/openssl-buildenv:${VERSION}-riscv64

          DIGEST=$(jq -r '.["containerimage.descriptor"].digest' "$METADATA_FILE")
          echo "DIGEST=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Generate SLSA Build Provenance (non-QUIC)
        if: ${{ steps.versions.outputs.NONQUIC_VERSION != '' }}
        uses: actions/attest@v4
        continue-on-error: true
        with:
          subject-name: index.docker.io/madnuttah/openssl-buildenv
          subject-digest: ${{ steps.nonquic_manifest.outputs.DIGEST }}
          push-to-registry: true

      - name: Generate SLSA Build Provenance (QUIC)
        if: ${{ steps.versions.outputs.QUIC_VERSION != '' }}
        uses: actions/attest@v4
        continue-on-error: true
        with:
          subject-name: index.docker.io/madnuttah/openssl-buildenv
          subject-digest: ${{ steps.quic_manifest.outputs.DIGEST }}
          push-to-registry: true
