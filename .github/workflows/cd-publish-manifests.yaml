name: CD Publish OpenSSL Buildenv Manifests

on:
  workflow_run:
    workflows:
      - CD Build OpenSSL Buildenv
      - CD Build OpenSSL QUIC Buildenv
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  publish-manifests:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Download non-QUIC version artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: openssl-buildenv-version
        continue-on-error: true

      - name: Download QUIC version artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: openssl-buildenv-quic-version
        continue-on-error: true

      - name: Read versions
        id: versions
        run: |
          set -euo pipefail
          NONQUIC_VERSION=""
          QUIC_VERSION=""
          if [ -f openssl-buildenv-version/version.txt ]; then
            NONQUIC_VERSION=$(cat openssl-buildenv-version/version.txt)
          fi
          if [ -f openssl-buildenv-quic-version/version.txt ]; then
            QUIC_VERSION=$(cat openssl-buildenv-quic-version/version.txt)
          fi
          if [ -z "$NONQUIC_VERSION" ] && [ -z "$QUIC_VERSION" ]; then
            echo "No version artifacts found, nothing to do."
            exit 0
          fi
          echo "NONQUIC_VERSION=${NONQUIC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "QUIC_VERSION=${QUIC_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create non-QUIC manifest
        if: ${{ steps.versions.outputs.NONQUIC_VERSION != '' }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.versions.outputs.NONQUIC_VERSION }}"
          docker buildx imagetools create \
            -t madnuttah/openssl-buildenv:${VERSION} \
            -t madnuttah/openssl-buildenv:latest \
            madnuttah/openssl-buildenv:${VERSION}-amd64 \
            madnuttah/openssl-buildenv:${VERSION}-386 \
            madnuttah/openssl-buildenv:${VERSION}-armv6 \
            madnuttah/openssl-buildenv:${VERSION}-armv7 \
            madnuttah/openssl-buildenv:${VERSION}-arm64 \
            madnuttah/openssl-buildenv:${VERSION}-ppc64le \
            madnuttah/openssl-buildenv:${VERSION}-s390x \
            madnuttah/openssl-buildenv:${VERSION}-riscv64

      - name: Create QUIC manifest
        if: ${{ steps.versions.outputs.QUIC_VERSION != '' }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.versions.outputs.QUIC_VERSION }}"
          docker buildx imagetools create \
            -t madnuttah/openssl-buildenv:${VERSION}-quic \
            -t madnuttah/openssl-buildenv:latest-quic \
            madnuttah/openssl-buildenv:${VERSION}-quic-amd64 \
            madnuttah/openssl-buildenv:${VERSION}-quic-386 \
            madnuttah/openssl-buildenv:${VERSION}-quic-armv6 \
            madnuttah/openssl-buildenv:${VERSION}-quic-armv7 \
            madnuttah/openssl-buildenv:${VERSION}-quic-arm64 \
            madnuttah/openssl-buildenv:${VERSION}-quic-ppc64le \
            madnuttah/openssl-buildenv:${VERSION}-quic-s390x \
            madnuttah/openssl-buildenv:${VERSION}-quic-riscv64

      # - name: Install Cosign
        # run: |
          # COSIGN_VERSION="v2.4.0"
          # curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o /usr/local/bin/cosign
          # chmod +x /usr/local/bin/cosign

