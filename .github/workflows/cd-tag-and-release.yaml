name: CD Tag And Release

on:
  workflow_dispatch:
 # workflow_run:
 #   workflows: ["CD Build OpenSSL+QUIC Buildenv"]
 #   types: [completed]

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
  #  if: >
  #    github.event_name == 'workflow_dispatch' ||
  #    (github.event_name == 'workflow_run' &&
  #     github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: false
          git_commit_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5

      - name: Push tag and upload release to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.BOT_GITHUB_TOKEN }}@github.com/${{ github.repository }}

          BUILDENV_BUILD_DATE="$(grep '^BUILDENV_BUILD_DATE=' buildvars | cut -d'=' -f2-)"
          OPENSSL_VERSION="$(grep '^OPENSSL_VERSION=' buildvars | cut -d'=' -f2-)"
          OPENSSL_BUILDENV_VERSION="$OPENSSL_VERSION-0"
          RELEASE_TAG="v$OPENSSL_BUILDENV_VERSION"

          CONTRIBUTORS=$(gh api repos/${{ github.repository }}/contributors --jq '.[].login' | sed 's/^/* @/g')

          RELEASE_NOTE=$(cat <<EOF
          ## $(date '+%Y-%m-%d') <madnuttah-bot>
          ## What's Changed?
          * Updated OpenSSL to version $OPENSSL_VERSION

          **OpenSSL changelog**: https://github.com/openssl/openssl/releases/tag/openssl-$OPENSSL_VERSION

          ## Contributors
          $CONTRIBUTORS
          EOF
          )

          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push -u origin "$RELEASE_TAG"

          git fetch --all --tags
          git checkout -b "$OPENSSL_BUILDENV_VERSION" "$RELEASE_TAG"
          git push --set-upstream origin "$OPENSSL_BUILDENV_VERSION"

          gh release create "$RELEASE_TAG" \
            -t "$OPENSSL_BUILDENV_VERSION" \
            -n "$RELEASE_NOTE" \
            --latest

          exit 0
