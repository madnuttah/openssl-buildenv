name: CD Tag And Release

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CD Build OpenSSL+QUIC Buildenv"]
    types: [completed]

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: false
          git_tag_gpgsign: true
          git_push_gpgsign: false
          trust_level: 5

      - name: Push tag and upload release to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          set -euo pipefail

          OPENSSL_VERSION="$(grep '^OPENSSL_BUILDENV_VERSION=' buildvars | cut -d'=' -f2-)"
          SUBVERSION="$(grep '^SUBVERSION=' buildvars | cut -d'=' -f2-)"

          TAG="${OPENSSL_VERSION}-${SUBVERSION}"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          git fetch --prune origin --tags
          if git ls-remote --tags origin | grep -q "refs/tags/v${TAG}$"; then
            echo "Tag v${TAG} already exists, skipping."
            exit 0
          fi

          git tag -s "v${TAG}" -m "v${TAG}"
          git push origin "v${TAG}" --force-with-lease

          gh release create "v${TAG}" -t "${TAG}" -n "Automated release for ${TAG}" --latest || \
          gh release edit "v${TAG}" -t "${TAG}" -n "Automated release for ${TAG}"
