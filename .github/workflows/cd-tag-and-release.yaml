name: CD Tag And Release

on:
  workflow_run:
    workflows:
      - CD Publish OpenSSL Buildenv Manifests
    types:
      - completed

permissions:
  contents: write
  actions: write

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: false
          git_tag_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5

      - name: Read version files
        id: versions
        run: |
          set -euo pipefail
          OPENSSL_VERSION=$(cat versions/openssl.txt)

          OPENSSL_BE_NONQUIC=$(grep '^openssl=' versions/openssl-buildenv.txt | cut -d= -f2)
          SUB_BE_NONQUIC=$(grep '^sub=' versions/openssl-buildenv.txt | cut -d= -f2)
          NONQUIC_VERSION="${OPENSSL_BE_NONQUIC}-${SUB_BE_NONQUIC}"

          OPENSSL_BE_QUIC=$(grep '^openssl=' versions/openssl-quic-buildenv.txt | cut -d= -f2)
          SUB_BE_QUIC=$(grep '^sub=' versions/openssl-quic-buildenv.txt | cut -d= -f2)
          QUIC_VERSION="${OPENSSL_BE_QUIC}-${SUB_BE_QUIC}"

          NGTCP2_VERSION=$(cat versions/ngtcp2.txt)
          NGHTTP3_VERSION=$(cat versions/nghttp3.txt)

          {
            echo "OPENSSL_VERSION=${OPENSSL_VERSION}"
            echo "NONQUIC_VERSION=${NONQUIC_VERSION}"
            echo "QUIC_VERSION=${QUIC_VERSION}"
            echo "NGTCP2_VERSION=${NGTCP2_VERSION}"
            echo "NGHTTP3_VERSION=${NGHTTP3_VERSION}"
          } >> "$GITHUB_OUTPUT"

      # - name: Download SBOM + provenance artifacts
        # uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        # with:
          # path: artifacts
        # continue-on-error: true

      - name: Push tags and create releases
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"

          OPENSSL="$(printf '%s' "${{ steps.versions.outputs.OPENSSL_VERSION }}")"
          NONQUIC="$(printf '%s' "${{ steps.versions.outputs.NONQUIC_VERSION }}")"
          QUIC="$(printf '%s' "${{ steps.versions.outputs.QUIC_VERSION }}")"
          NGTCP2="$(printf '%s' "${{ steps.versions.outputs.NGTCP2_VERSION }}")"
          NGHTTP3="$(printf '%s' "${{ steps.versions.outputs.NGHTTP3_VERSION }}")"

          TAG_NONQUIC="v${NONQUIC}"
          TAG_QUIC="v${QUIC}-quic"

          git fetch --prune origin --tags

          if ! git rev-parse "${TAG_NONQUIC}" >/dev/null 2>&1; then
            git tag "${TAG_NONQUIC}"
            git push origin "${TAG_NONQUIC}"
          fi

          if ! git rev-parse "${TAG_QUIC}" >/dev/null 2>&1; then
            git tag "${TAG_QUIC}"
            git push origin "${TAG_QUIC}"
          fi

          NOTES=""

          UPDATED_OPENSSL=false
          UPDATED_NGTCP2=false
          UPDATED_NGHTTP3=false
          UPDATED_QUIC=false

          if git diff HEAD~1 HEAD -- versions/openssl.txt >/dev/null 2>&1; then
            UPDATED_OPENSSL=true
          fi

          if git diff HEAD~1 HEAD -- versions/ngtcp2.txt >/dev/null 2>&1; then
            UPDATED_NGTCP2=true
          fi

          if git diff HEAD~1 HEAD -- versions/nghttp3.txt >/dev/null 2>&1; then
            UPDATED_NGHTTP3=true
          fi

          if git diff HEAD~1 HEAD -- versions/openssl-quic-buildenv.txt >/dev/null 2>&1; then
            UPDATED_QUIC=true
          fi
          
          if [ "$UPDATED_OPENSSL" = true ]; then
            NOTES+="## OpenSSL Buildenv\n"
            NOTES+="OpenSSL: ${OPENSSL}\n"
            NOTES+="Release notes: https://github.com/openssl/openssl/releases/tag/${OPENSSL#openssl-}\n"
            NOTES+="Buildenv version: ${NONQUIC}\n\n"
          fi

          if [ "$UPDATED_QUIC" = true ] || [ "$UPDATED_NGTCP2" = true ] || [ "$UPDATED_NGHTTP3" = true ]; then
            NOTES+="## OpenSSL QUIC Buildenv\n"
            NOTES+="Version: ${QUIC}\n"
            NOTES+="OpenSSL: ${OPENSSL}\n"

            if [ "$UPDATED_NGTCP2" = true ]; then
              NOTES+="- ngtcp2: ${NGTCP2}\n"
              NOTES+="  Release notes: https://github.com/ngtcp2/ngtcp2/releases/tag/${NGTCP2}\n"
            fi

            if [ "$UPDATED_NGHTTP3" = true ]; then
              NOTES+="- nghttp3: ${NGHTTP3}\n"
              NOTES+="  Release notes: https://github.com/ngtcp2/nghttp3/releases/tag/${NGHTTP3}\n"
            fi

            NOTES+="\n"
          fi

          printf "%b" "$NOTES" > RELEASE_NOTES.md

          gh release create "${TAG_NONQUIC}" \
            -t "${TAG_NONQUIC}" \
            -F RELEASE_NOTES.md \
            --latest=false || true

          gh release create "${TAG_QUIC}" \
            -t "${TAG_QUIC}" \
            -F RELEASE_NOTES.md \
            --latest=false || true

      # - name: Upload SBOM + provenance to releases
