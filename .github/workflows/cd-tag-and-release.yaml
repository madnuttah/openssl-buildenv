name: CD Tag And Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CD Build OpenSSL+QUIC Buildenv"]
    types: [completed]

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5

      - name: Push tag and upload release
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GPG_FPR: ${{ steps.IMPORT_GPG.outputs.fingerprint }}
        run: |
          source buildvars

          SUB="${{ github.event.inputs.subversion || '0' }}"

          OPENSSL_TAG="$(echo $OPENSSL_BUILDENV_VERSION | sed 's/-[^-]*$//')-$SUB"
          QUIC_TAG="$(echo $QUIC_BUILDENV_VERSION | sed 's/-[^-]*$//')-$SUB-quic"

          git remote set-url origin https://x-access-token:${{ secrets.BOT_GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git config user.name "${GIT_AUTHOR_NAME}"
          git config user.email "${GIT_AUTHOR_EMAIL}"
          git config user.signingkey "$GPG_FPR"

          git tag -s "v${OPENSSL_TAG}" -m "v${OPENSSL_TAG}"
          git tag -s "v${QUIC_TAG}" -m "v${QUIC_TAG}"

          git push origin "v${OPENSSL_TAG}" --force-with-lease
          git push origin "v${QUIC_TAG}" --force-with-lease

          gh release create "v${OPENSSL_TAG}" \
            -t "${OPENSSL_TAG}" \
            -n "Updated OpenSSL and QUIC buildenv"
