name: CD Tag And Release

on:
  workflow_run:
    workflows:
      - CD Publish OpenSSL Buildenv Manifests
    types:
      - completed

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_push_gpgsign: false
          trust_level: 5
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Read version files
        id: versions
        run: |
          set -euo pipefail

          OPENSSL_VERSION="$(cat versions/openssl.txt)"
          NONQUIC_VERSION="$(grep '^openssl=' versions/openssl-buildenv.txt | cut -d= -f2)"
          QUIC_VERSION="$(grep '^openssl=' versions/openssl-quic-buildenv.txt | cut -d= -f2)"
          NGTCP2_VERSION="$(cat versions/ngtcp2.txt)"
          NGHTTP3_VERSION="$(cat versions/nghttp3.txt)"

          {
            echo "OPENSSL_VERSION=${OPENSSL_VERSION}"
            echo "NONQUIC_VERSION=${NONQUIC_VERSION}"
            echo "QUIC_VERSION=${QUIC_VERSION}"
            echo "NGTCP2_VERSION=${NGTCP2_VERSION}"
            echo "NGHTTP3_VERSION=${NGHTTP3_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Build Workflow Run ID
        id: resolve_id
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          MANIFEST_RUN_ID="${{ github.event.workflow_run.id }}"
          PREVIOUS_URL="$(gh api repos/"$TARGET_REPO"/actions/runs/"$MANIFEST_RUN_ID" --jq '.previous_attempt_url // empty')"

          BUILD_RUN_ID=""

          if [ -n "$PREVIOUS_URL" ]; then
            BUILD_RUN_ID="$(echo "$PREVIOUS_URL" | grep -oE '[0-9]+$' | tail -1)"
          else
            echo "Using fallback search via API..."

            WORKFLOWS=(
              "CD Build OpenSSL Buildenv"
              "CD Build OpenSSL QUIC Buildenv"
            )

            for wf in "${WORKFLOWS[@]}"; do
              ID="$(gh run list --repo "$TARGET_REPO" --workflow="$wf" --status=success --limit=1 --json databaseId --jq '.. | .databaseId? // empty')"
              if [ -n "$ID" ]; then
                BUILD_RUN_ID="$ID"
                break
              fi
            done
          fi

          if [ -z "$BUILD_RUN_ID" ]; then
            echo "Error: Could not resolve root build run ID." >&2
            exit 1
          fi

          {
            echo "Resolved Build Run ID: $BUILD_RUN_ID"
            echo "BUILD_RUN_ID=$BUILD_RUN_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Download SBOM artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          run-id: ${{ steps.resolve_id.outputs.BUILD_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: sbom-artifacts
        continue-on-error: true
        
      - name: Download manifest metadata artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: openssl-manifest-metadata
          run-id: ${{ steps.resolve_id.outputs.BUILD_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: manifest-metadata
        continue-on-error: true

      - name: Push tags and create releases
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"

          OPENSSL="${{ steps.versions.outputs.OPENSSL_VERSION }}"
          NONQUIC="${{ steps.versions.outputs.NONQUIC_VERSION }}"
          QUIC="${{ steps.versions.outputs.QUIC_VERSION }}"
          NGTCP2="${{ steps.versions.outputs.NGTCP2_VERSION }}"
          NGHTTP3="${{ steps.versions.outputs.NGHTTP3_VERSION }}"

          TAG_NONQUIC="v${NONQUIC}"
          TAG_QUIC="v${QUIC}"

          git fetch --prune origin --tags

          if ! git rev-parse "$TAG_NONQUIC" >/dev/null 2>&1; then
            git tag -a "$TAG_NONQUIC" -m "$TAG_NONQUIC"
            git push origin "$TAG_NONQUIC"

            git checkout -b "$NONQUIC" "$TAG_NONQUIC"
            git push --set-upstream origin "$NONQUIC"
          fi

          if ! git rev-parse "$TAG_QUIC" >/dev/null 2>&1; then
            git tag -a "$TAG_QUIC" -m "$TAG_QUIC"
            git push origin "$TAG_QUIC"

            git checkout -b "$QUIC" "$TAG_QUIC"
            git push --set-upstream origin "$QUIC"
          fi

          UPDATED_OPENSSL=false
          UPDATED_NGTCP2=false
          UPDATED_NGHTTP3=false
          UPDATED_QUIC=false

          if ! git diff --quiet HEAD~1 HEAD -- "versions/openssl.txt"; then
            UPDATED_OPENSSL=true
          fi

          if ! git diff --quiet HEAD~1 HEAD -- "versions/ngtcp2.txt"; then
            UPDATED_NGTCP2=true
          fi

          if ! git diff --quiet HEAD~1 HEAD -- "versions/nghttp3.txt"; then
            UPDATED_NGHTTP3=true
          fi

          if ! git diff --quiet HEAD~1 HEAD -- "versions/openssl-quic-buildenv.txt"; then
            UPDATED_QUIC=true
          fi

          rm -f RELEASE_NOTES.md
          touch RELEASE_NOTES.md

          if [ "$UPDATED_OPENSSL" = true ]; then
          {
            printf "## OpenSSL Buildenv\n"
            printf "OpenSSL: %s\n" "$OPENSSL"
            printf "Release notes: https://github.com/%s\n" "${OPENSSL#openssl-}"
            printf "Buildenv version: %s\n\n" "$NONQUIC"
          } >> RELEASE_NOTES.md
          fi

          if [ "$UPDATED_QUIC" = true ] || [ "$UPDATED_NGTCP2" = true ] || [ "$UPDATED_NGHTTP3" = true ]; then
          {
            printf "## OpenSSL QUIC Buildenv\n"
            printf "Version: %s\n" "$QUIC"
            printf "OpenSSL: %s\n" "$OPENSSL"

            if [ "$UPDATED_NGTCP2" = true ]; then
              printf "- ngtcp2: %s\n" "$NGTCP2"
              printf "  Release notes: https://github.com/%s\n" "$NGTCP2"
            fi

            if [ "$UPDATED_NGHTTP3" = true ]; then
              printf "- nghttp3: %s\n" "$NGHTTP3"
              printf "  Release notes: https://github.com/%s\n" "$NGHTTP3"
            fi

            printf "\n"
          } >> RELEASE_NOTES.md
          fi

          gh release create "$TAG_NONQUIC" \
            -t "$TAG_NONQUIC" \
            -F RELEASE_NOTES.md \
            --latest || true

          gh release create "$TAG_QUIC" \
            -t "$TAG_QUIC" \
            -F RELEASE_NOTES.md \
            --latest=false || true
            
      - name: Prepare release artifacts
        run: |
          set -euo pipefail

          mkdir -p release-artifacts

          if [ -d sbom-artifacts ]; then
            find sbom-artifacts -type f \( -name "*.json" -o -name "*.cyclonedx.json" \) -print0 |
            while IFS= read -r -d '' sbom; do
              cp "$sbom" release-artifacts/ || true
            done
          fi

          cd release-artifacts
          if [ -n "$(ls -A .)" ]; then
            find . -type f ! -name "*.sha256" -exec sha256sum {} \; > checksums.sha256
          fi
