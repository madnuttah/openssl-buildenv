name: CD Tag And Release

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CD Build OpenSSL QUIC Buildenv"]
    types:
      - completed

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: false
          git_tag_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5

      - name: Push tag and upload release to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          set -euo pipefail

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          OPENSSL_VERSION="$(grep '^OPENSSL_BUILDENV_VERSION=' buildvars | cut -d'=' -f2-)"
          SUBVERSION="$(grep '^SUBVERSION=' buildvars | cut -d'=' -f2-)"
          TAG="${OPENSSL_VERSION}-${SUBVERSION}"

          git fetch --prune origin --tags
          if git rev-parse "refs/tags/v${TAG}" >/dev/null 2>&1; then
            echo "Tag v${TAG} already exists."
            exit 1
          fi

          PREV_TAG=$(git tag --sort=-v:refname | grep -v "v${TAG}$" | head -n 1)

          OPENSSL_VER="$(grep '^OPENSSL_VERSION=' buildvars | cut -d'=' -f2-)"
          NGTCP2_VER="$(grep '^NGTCP2_VERSION=' buildvars | cut -d'=' -f2-)"
          NGHTTP3_VER="$(grep '^NGHTTP3_VERSION=' buildvars | cut -d'=' -f2-)"

          RELEASE_NOTES="## v${TAG} — $(date -u +"%Y-%m-%d")\n"
          RELEASE_NOTES+="## What's Changed?\n"
          RELEASE_NOTES+="* Updated OpenSSL & OpenSSL+QUIC buildenv\n\n"
          
          RELEASE_NOTES+="OpenSSL: ${OPENSSL_VER}\n"
          RELEASE_NOTES+="ngtcp2: ${NGTCP2_VER}\n"
          RELEASE_NOTES+="nghttp3: ${NGHTTP3_VER}\n\n"
          
          RELEASE_NOTES+="## OpenSSL Release Notes\n"
          RELEASE_NOTES+="https://github.com/openssl/openssl/releases/tag/openssl-${OPENSSL_VER}\n\n"
          
          RELEASE_NOTES+="## Contributors\n"


          git log "${PREV_TAG}..HEAD" --format="%aN|%aE" \
            | sort -u \
            | while IFS='|' read -r NAME EMAIL; do
                LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
                if echo "$LOWER" | grep -Eq "bot|github-actions"; then
                  continue
                fi
                USER=$(curl -s "https://api.github.com/search/users?q=${EMAIL}" \
                  | jq -r '.items[0].login // empty')
                if [ -n "$USER" ]; then
                  RELEASE_NOTES+="- @${USER}\n"
                else
                  RELEASE_NOTES+="- ${NAME}\n"
                fi
              done

          printf "%b" "$RELEASE_NOTES" > RELEASE_NOTES.md

          git tag "v${TAG}"
          git push origin "v${TAG}"

          git checkout -b "${TAG}" "v${TAG}"
          git push --set-upstream origin "${TAG}"

          gh release create "v${TAG}" \
            -t "${TAG}" \
            -F RELEASE_NOTES.md \
            --latest || \
          gh release edit "v${TAG}" \
            -t "${TAG}" \
            -F RELEASE_NOTES.md
