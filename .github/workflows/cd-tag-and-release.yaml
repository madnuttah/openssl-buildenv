name: CD Tag And Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CD Build OpenSSL+QUIC Buildenv"]
    types: [completed]

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
#          clean: true

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: false
          git_tag_gpgsign: false
          git_push_gpgsign: false
          trust_level: 5

      - name: Push tag and upload release to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GPG_FPR: ${{ steps.IMPORT_GPG.outputs.fingerprint }}
        run: |
          BUILDENV_BUILD_DATE="$(grep '^BUILDENV_BUILD_DATE=' buildvars | cut -d'=' -f2-)"
          OPENSSL_VERSION="$(grep '^OPENSSL_VERSION=' buildvars | cut -d'=' -f2-)"
          OPENSSL_BUILDENV_VERSION="$(grep '^OPENSSL_BUILDENV_VERSION=' buildvars | cut -d'=' -f2-)"
          QUIC_BUILDENV_VERSION="$(grep '^QUIC_BUILDENV_VERSION=' buildvars | cut -d'=' -f2-)"
          NGTCP2_VERSION="$(grep '^NGTCP2_VERSION=' buildvars | cut -d'=' -f2-)"
          NGHTTP3_VERSION="$(grep '^NGHTTP3_VERSION=' buildvars | cut -d'=' -f2-)"

          SUB="${{ github.event.inputs.subversion || '0' }}"

          if [ "${SUB}" = "0" ]; then
            OPENSSL_TAG="${OPENSSL_BUILDENV_VERSION}"
            QUIC_TAG="${QUIC_BUILDENV_VERSION}"
          else
            OPENSSL_BASE="$(printf "%s" "${OPENSSL_BUILDENV_VERSION}" | sed -E 's/-[0-9]+$//')"
            QUIC_BASE="$(printf "%s" "${QUIC_BUILDENV_VERSION}" | sed -E 's/-quic$//' | sed -E 's/-[0-9]+$//')"
            OPENSSL_TAG="${OPENSSL_BASE}-${SUB}"
            QUIC_TAG="${QUIC_BASE}-${SUB}-quic"
          fi

          git remote set-url origin https://x-access-token:${{ secrets.BOT_GITHUB_TOKEN }}@github.com/${{ github.repository }}

          PREV_TAG=$(gh release list --limit 2 --json tagName --jq '.[1].tagName' 2>/dev/null || true)

          if [ -z "$PREV_TAG" ]; then
            NEW_CONTRIBS=$(gh api repos/${{ github.repository }}/contributors --jq '.[].login' 2>/dev/null || true)
            if [ -z "$NEW_CONTRIBS" ]; then
              CONTRIBUTORS="* No contributors found"
            else
              CONTRIBUTORS=$(printf "%s\n" $NEW_CONTRIBS | sed 's/^/* @/g')
            fi
          else
            COMMITS_JSON=$(gh api repos/${{ github.repository }}/compare/${PREV_TAG}...HEAD 2>/dev/null || true)
            NEW_CONTRIBS=$(printf "%s" "$COMMITS_JSON" | jq -r '.commits[].author.login // empty' | sort -u)
            if [ -z "$NEW_CONTRIBS" ]; then
              CONTRIBUTORS="* No new contributors since ${PREV_TAG}"
            else
              CONTRIBUTORS=$(printf "%s\n" $NEW_CONTRIBS | sed 's/^/* @/g')
            fi
          fi

          RELEASE_NOTE=$(printf "%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n" \
            "## $(date '+%Y-%m-%d') <madnuttah-bot>" \
            "## What's Changed?" \
            "* Updated OpenSSL and OpenSSL+QUIC to version $OPENSSL_VERSION" \
            "" \
            "OpenSSL changelog: https://github.com/openssl/openssl/releases/tag/openssl-$OPENSSL_VERSION" \
            "" \
            "## Included QUIC components" \
            "* ngtcp2: $NGTCP2_VERSION" \
            "* nghttp3: $NGHTTP3_VERSION" \
            "" \
            "## New Contributors" \
            "$CONTRIBUTORS" \
          )

          git config user.name "${GIT_AUTHOR_NAME}"
          git config user.email "${GIT_AUTHOR_EMAIL}"

          git tag -a "v${OPENSSL_TAG}" -m "v${OPENSSL_TAG}"
          git tag -a "v${QUIC_TAG}" -m "v${QUIC_TAG}"

          git push -u origin "v${OPENSSL_TAG}" --force-with-lease
          git push -u origin "v${QUIC_TAG}" --force-with-lease

          git fetch --all --tags
          git checkout -b "${OPENSSL_TAG}" "v${OPENSSL_TAG}" || git checkout "${OPENSSL_TAG}"
          git push --set-upstream origin "${OPENSSL_TAG}" --force-with-lease

          gh release create "v${OPENSSL_TAG}" \
            -t "${OPENSSL_TAG}" \
            -n "$RELEASE_NOTE" \
            --latest

          exit 0
