name: CD Build OpenSSL Buildenv

on:
  push:
    branches:
      - main
    paths:
      - versions/openssl.txt
#      - versions/openssl-buildenv.txt
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      buildenv_version: ${{ steps.vars.outputs.BUILDENV_VERSION }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: 386
            platform: linux/386
          - arch: armv6
            platform: linux/arm/v6
          - arch: armv7
            platform: linux/arm/v7
          - arch: arm64
            platform: linux/arm64
          - arch: ppc64le
            platform: linux/ppc64le
          - arch: s390x
            platform: linux/s390x
          - arch: riscv64
            platform: linux/riscv64

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Load versions
        id: vars
        run: |
          set -euo pipefail

          OPENSSL_VERSION="$(cat versions/openssl.txt)"

          BUILDENV_VERSION="$(grep '^openssl=' versions/openssl-buildenv.txt | cut -d= -f2)"

          SHA_URL="https://github.com/openssl/openssl/releases/download/${OPENSSL_VERSION}/${OPENSSL_VERSION}.tar.gz.sha256"

          if ! curl --fail -sL "$SHA_URL" >/dev/null; then
            echo "ERROR: SHA256 file not found for ${OPENSSL_VERSION}"
            exit 1
          fi

          OPENSSL_SHA256="$(curl -sL "$SHA_URL" | awk '{print $1}')"

          BUILDENV_BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          {
            echo "OPENSSL_VERSION=${OPENSSL_VERSION}"
            echo "BUILDENV_VERSION=${BUILDENV_VERSION}"
            echo "OPENSSL_SHA256=${OPENSSL_SHA256}"
            echo "BUILDENV_BUILD_DATE=${BUILDENV_BUILD_DATE}"
          } >> "$GITHUB_OUTPUT"
          
      - name: Show versions
        run: |
          {
            echo "BUILDENV_BUILD_DATE=${{ steps.vars.outputs.BUILDENV_BUILD_DATE }}"
            echo "OPENSSL_VERSION=${{ steps.vars.outputs.OPENSSL_VERSION }}"
            echo "BUILDENV_VERSION=${{ steps.vars.outputs.BUILDENV_VERSION }}"
            echo "OPENSSL_SHA256=${{ steps.vars.outputs.OPENSSL_SHA256 }}"
          }

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push OpenSSL image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./openssl/openssl.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=registry,ref=madnuttah/openssl-buildenv:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=madnuttah/openssl-buildenv:buildcache-${{ matrix.arch }},mode=max
          build-args: |
            BUILDENV_BUILD_DATE=${{ steps.vars.outputs.BUILDENV_BUILD_DATE }}
            OPENSSL_VERSION=${{ steps.vars.outputs.OPENSSL_VERSION }}
            OPENSSL_SHA256=${{ steps.vars.outputs.OPENSSL_SHA256 }}
            TARGETARCH=${{ matrix.arch }}
          tags: |
            madnuttah/openssl-buildenv:${{ steps.vars.outputs.BUILDENV_VERSION }}-${{ matrix.arch }}

  upload-pipeline-metadata:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit
          
      - name: Create Isolated Metadata
        run: |
          mkdir -p metadata-payload
          printf "%s" "${{ needs.build.outputs.buildenv_version }}" > metadata-payload/version.txt
          printf "stable" > metadata-payload/variant.txt

      - name: Upload Metadata Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: openssl-buildenv-metadata
          path: metadata-payload/
          retention-days: 1

  sbom:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: 386
          - arch: armv6
          - arch: armv7
          - arch: arm64
          - arch: ppc64le
          - arch: s390x
          - arch: riscv64

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit
          
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM for ${{ matrix.arch }}
        env:
          IMAGE: madnuttah/openssl-buildenv:${{ needs.build.outputs.buildenv_version }}-${{ matrix.arch }}
        run: |
          syft packages "docker:${IMAGE}" \
            -o cyclonedx-json \
            -o json \
            --file sbom-${{ matrix.arch }}.cyclonedx.json \
            --file sbom-${{ matrix.arch }}.json || true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-openssl-buildenv-${{ matrix.arch }}
          path: sbom-${{ matrix.arch }}.*
          if-no-files-found: ignore

