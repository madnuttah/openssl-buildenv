name: CD Cleanup Dockerhub Tags

on:
  workflow_run:
    workflows: workflows: ["CD Build Multiarch OpenSSL BuildEnv Docker Image", "CD Build Multiarch OpenSSL+Quic BuildEnv Docker Image"]
    types:
      - completed
  #workflow_dispatch:

env:
  DOCKERHUB_SLUG: "madnuttah/openssl-buildenv"

jobs:
  cleanup-tags:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      DELETE_SUFFIXES: "-386 -arm64 -amd64 -armv6 -armv7"
      DRY_RUN: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Login to Dockerhub (Docker CLI)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Docker Hub JWT for API calls
        if: github.event_name != 'pull_request'
        id: auth
        run: |
          set -euo pipefail
          token=$(curl -s -X POST https://hub.docker.com/v2/users/login/ \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.DOCKERHUB_USERNAME }}\",\"password\":\"${{ secrets.DOCKERHUB_TOKEN }}\"}" \
            | jq -r .token)
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "failed to get Docker Hub token" >&2
            exit 1
          fi
          echo "DOCKERHUB_TOKEN_JWT=$token" >> $GITHUB_OUTPUT

      - name: List tags and delete matches
        env:
          REPO: ${{ env.DOCKERHUB_SLUG }}
          SUFFIXES: ${{ env.DELETE_SUFFIXES }}
          DRY_RUN: ${{ env.DRY_RUN }}
          JWT: ${{ steps.auth.outputs.DOCKERHUB_TOKEN_JWT }}
        run: |
          set -euo pipefail

          echo "repo: $REPO"
          echo "suffixes: $SUFFIXES"
          echo "dry run: $DRY_RUN"

          delete_tag() {
            tag="$1"
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY-RUN] would delete: $tag"
              return 0
            fi
            echo "deleting: $tag"
            code=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: JWT $JWT" \
              "https://hub.docker.com/v2/repositories/${REPO}/tags/${tag}/")
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "deleted: $tag"
            else
              echo "failed to delete $tag (HTTP $code)" >&2
            fi
          }

          page="https://hub.docker.com/v2/repositories/${REPO}/tags?page_size=100"
          while [ -n "$page" ] && [ "$page" != "null" ]; do
            echo "fetching $page"
            body=$(curl -s "$page")
            page=$(echo "$body" | jq -r '.next')
            echo "$body" | jq -r '.results[].name' | while read -r tag; do
              for s in $SUFFIXES; do
                if [[ "$tag" == *"$s" ]]; then
                  delete_tag "$tag"
                  break
                fi
              done
            done
          done

          echo "cleanup done."
